name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHONPATH: .
  DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app
  SUPABASE_JWT_SECRET: ci-test-secret-placeholder
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest>=8.2 pytest-asyncio>=0.23 pytest-cov>=5.0 "httpx[testing]>=0.27" respx>=0.21
      - name: Run migrations
        continue-on-error: true
        run: alembic -c backend/alembic.ini upgrade head
      - name: Run backend tests
        run: pytest backend/tests/ -v --tb=short -p no:cacheprovider
      - name: Smoke test healthz endpoint
        run: |
          uvicorn backend.app.main:app --host 0.0.0.0 --port 8001 &
          sleep 4
          curl -sf http://localhost:8001/healthz | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status'] in ('ok','healthy'), f'Bad: {d}'; print('healthz OK:', d)"
          kill %1 || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
      - name: Build frontend
        run: npm run build
      - name: Run frontend tests
        run: npm test -- --run || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
